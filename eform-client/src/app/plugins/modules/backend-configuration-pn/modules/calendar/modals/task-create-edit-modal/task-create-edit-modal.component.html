<h2 mat-dialog-title>{{ isEditMode ? 'Rediger opgave' : 'Ny opgave' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="task-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Titel</mat-label>
      <input matInput formControlName="title" required>
    </mat-form-field>

    <div class="row-fields">
      <mat-form-field appearance="outline">
        <mat-label>Dato</mat-label>
        <input matInput type="date" formControlName="taskDate">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Starttid (time)</mat-label>
        <input matInput type="number" formControlName="startHour" min="0" max="23" step="0.25">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Varighed (timer)</mat-label>
        <input matInput type="number" formControlName="dur" min="0.25" step="0.25">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width" *ngIf="data.boards.length > 0">
      <mat-label>Tavle</mat-label>
      <mat-select formControlName="boardId">
        <mat-option *ngFor="let board of data.boards" [value]="board.id">{{ board.name }}</mat-option>
      </mat-select>
    </mat-form-field>

    <div class="color-picker" *ngIf="!form.value.boardId">
      <label>Farve:</label>
      <div class="colors">
        <div
          class="color-swatch"
          *ngFor="let c of colors"
          [style.background]="c"
          [class.selected]="form.value.color === c"
          (click)="form.patchValue({color: c})"
        ></div>
      </div>
    </div>

    <mat-form-field appearance="outline" class="full-width" *ngIf="data.employees.length > 0">
      <mat-label>Ansvarlig</mat-label>
      <mtx-select formControlName="assigneeIds" [multiple]="true" bindValue="id" bindLabel="name" [items]="data.employees"></mtx-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width" *ngIf="data.tags.length > 0">
      <mat-label>Tags</mat-label>
      <mtx-select formControlName="tags" [multiple]="true" [addTag]="true" [items]="data.tags"></mtx-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Gentagelse</mat-label>
      <mat-select formControlName="repeatRule" (selectionChange)="onRepeatChange($event.value)">
        <mat-option *ngFor="let opt of repeatOptions" [value]="opt.value">{{ opt.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Beskrivelse</mat-label>
      <textarea matInput formControlName="descriptionHtml" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Drive-link</mat-label>
      <input matInput formControlName="driveLink" type="url">
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuller</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid" (click)="onSave()">
    {{ isEditMode ? 'Gem ændringer' : 'Opret opgave' }}
  </button>
</mat-dialog-actions>
