<div class="schedule-view">
  <div *ngIf="groups.length === 0" class="no-tasks">
    {{ 'No tasks this week' | translate }}.
  </div>

  <div class="schedule-group" *ngFor="let group of groups">
    <div class="group-header">{{ group.dateLabel }}</div>

    <div
      class="schedule-item"
      *ngFor="let task of group.tasks"
      [style.border-left-color]="task.color"
      (click)="onTaskClicked(task, $event)"
    >
      <div class="task-time">{{ task.startText }} – {{ task.endText }}</div>
      <div class="task-info">
        <span class="task-title" [class.completed]="task.completed">{{ task.title }}</span>
        <span class="task-tags" *ngIf="task.tags?.length">
          <span class="tag" *ngFor="let tag of task.tags">{{ tag }}</span>
        </span>
      </div>
    </div>
  </div>
</div>
