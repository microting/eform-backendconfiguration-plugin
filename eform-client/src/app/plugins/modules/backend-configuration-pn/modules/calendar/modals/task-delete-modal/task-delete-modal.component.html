<h2 mat-dialog-title>Slet opgave</h2>

<mat-dialog-content>
  <p>Er du sikker på, at du vil slette <strong>{{ data.task.title }}</strong>?</p>

  <mat-radio-group [(ngModel)]="scope" *ngIf="data.hasSeries" class="scope-group">
    <mat-radio-button value="this">Kun denne</mat-radio-button>
    <mat-radio-button value="thisAndFollowing">Denne og efterfølgende</mat-radio-button>
    <mat-radio-button value="all">Alle i serien</mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuller</button>
  <button mat-raised-button color="warn" (click)="onConfirm()">Slet</button>
</mat-dialog-actions>
