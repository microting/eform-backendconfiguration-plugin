<h2 mat-dialog-title>
  <mat-icon style="vertical-align: middle; margin-right: 8px;">dashboard</mat-icon>
  {{ 'Opret tavle' | translate }}
</h2>
<mat-dialog-content>
  <form [formGroup]="form">
    <label class="field-label">{{ 'Navn' | translate }}</label>
    <mat-form-field appearance="outline" style="width: 100%;">
      <input matInput formControlName="name" [placeholder]="'Indtast navn tavle' | translate">
    </mat-form-field>

    <label class="field-label">{{ 'Farve' | translate }}</label>
    <div class="color-picker-grid">
      <div
        class="color-swatch"
        *ngFor="let c of colors"
        [style.background]="c"
        [class.selected]="form.value.color === c"
        (click)="form.patchValue({color: c})"
      ></div>
    </div>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ 'Annuller' | translate }}</button>
  <button mat-flat-button color="primary" [disabled]="form.invalid" (click)="onSave()">{{ 'Opret' | translate }}</button>
</mat-dialog-actions>
