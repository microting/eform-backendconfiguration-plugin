<div class="custom-repeat-dialog">
  <div class="custom-repeat-title">{{ 'Custom repeat' | translate }}</div>

  <div class="custom-repeat-content">
    <!-- Repeat every N [unit] -->
    <div class="repeat-every-row">
      <span class="repeat-label">{{ 'Repeat every' | translate }}</span>
      <mat-form-field class="step-input" appearance="outline">
        <input matInput type="number" [(ngModel)]="step" min="1" max="99">
      </mat-form-field>
      <mat-form-field class="unit-select" appearance="outline">
        <mtx-select
          [(ngModel)]="unit"
          [items]="unitOptions"
          bindValue="value"
          bindLabel="label"
          [clearable]="false"
          [searchable]="false"
        ></mtx-select>
      </mat-form-field>
    </div>

    <!-- Weekday picker (week mode only) -->
    <div class="weekday-row" *ngIf="unit === 'week'">
      <span class="repeat-on-label">{{ 'Repeat on' | translate }}</span>
      <div
        class="day-circle"
        *ngFor="let wd of weekdays"
        [class.active]="wd.active"
        (click)="toggleWeekday(wd)"
      >{{ wd.label }}</div>
    </div>

    <!-- Ends section -->
    <div class="ends-section">
      <div class="ends-label">{{ 'Ends' | translate }}</div>

      <mat-radio-group [(ngModel)]="endMode">
        <div class="end-option">
          <mat-radio-button value="never"></mat-radio-button>
          <span class="end-option-label">{{ 'Never' | translate }}</span>
        </div>

        <div class="end-option">
          <mat-radio-button value="until"></mat-radio-button>
          <span class="end-option-label">{{ 'On' | translate }}</span>
          <div class="date-input" cdkOverlayOrigin #miniPickerOrigin="cdkOverlayOrigin">
            <mat-form-field appearance="outline">
              <input matInput
                     readonly
                     [value]="formattedUntilDate"
                     [disabled]="endMode !== 'until'"
                     (click)="endMode === 'until' && (showMiniPicker = !showMiniPicker)">
              <button mat-icon-button matIconSuffix type="button"
                      [disabled]="endMode !== 'until'"
                      (click)="showMiniPicker = !showMiniPicker; $event.stopPropagation()">
                <mat-icon>calendar_today</mat-icon>
              </button>
            </mat-form-field>
          </div>

          <ng-template
            cdkConnectedOverlay
            [cdkConnectedOverlayOrigin]="miniPickerOrigin"
            [cdkConnectedOverlayOpen]="showMiniPicker"
            [cdkConnectedOverlayHasBackdrop]="true"
            cdkConnectedOverlayBackdropClass="cdk-overlay-transparent-backdrop"
            (backdropClick)="showMiniPicker = false"
            (overlayOutsideClick)="showMiniPicker = false">
            <div class="mini-picker-overlay-card">
              <app-calendar-mini-calendar
                [selectedDate]="untilDateObj"
                [minDate]="data.date"
                (dateSelected)="onMiniDateSelected($event)">
              </app-calendar-mini-calendar>
            </div>
          </ng-template>
        </div>

        <div class="end-option">
          <mat-radio-button value="after"></mat-radio-button>
          <span class="end-option-label">{{ 'After' | translate }}</span>
          <mat-form-field class="count-input" appearance="outline">
            <input matInput type="number" [(ngModel)]="afterCount" min="1" [disabled]="endMode !== 'after'">
          </mat-form-field>
          <span class="count-suffix">{{ 'occurrences' | translate }}</span>
        </div>
      </mat-radio-group>
    </div>
  </div>

  <div class="custom-repeat-actions">
    <button class="btn-cancel-gcal" (click)="onCancel()">{{ 'Cancel' | translate }}</button>
    <button class="btn-done-gcal" (click)="onConfirm()">{{ 'Done' | translate }}</button>
  </div>
</div>
