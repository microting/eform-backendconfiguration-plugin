<h2 mat-dialog-title>{{ data.mode === 'edit' ? 'Rediger' : 'Slet' }} gentagelse</h2>

<mat-dialog-content>
  <p>Denne opgave er en del af en gentagende serie. Hvad vil du {{ data.mode === 'edit' ? 'redigere' : 'slette' }}?</p>

  <mat-radio-group [(ngModel)]="scope" class="scope-group">
    <mat-radio-button value="this">Kun denne</mat-radio-button>
    <mat-radio-button value="thisAndFollowing">Denne og efterfølgende</mat-radio-button>
    <mat-radio-button value="all">Alle i serien</mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuller</button>
  <button mat-raised-button color="primary" (click)="onConfirm()">Bekræft</button>
</mat-dialog-actions>
