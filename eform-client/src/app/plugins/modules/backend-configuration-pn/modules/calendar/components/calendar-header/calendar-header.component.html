<div class="calendar-header">
  <button
    class="btn-secondary btn-secondary--icon-rounded-border"
    (click)="toggleSidebar.emit()"
    [matTooltip]="sidebarOpen ? ('Close sidebar' | translate) : ('Open sidebar' | translate)"
  >
    <mat-icon>{{ sidebarOpen ? 'menu_open' : 'menu' }}</mat-icon>
  </button>

  <button
    class="btn-secondary btn-secondary--icon-rounded-border"
    (click)="goToToday.emit()"
    [matTooltip]="'Today' | translate"
  >
    {{ 'Today' | translate }}
  </button>

  <button
    class="btn-secondary btn-secondary--icon-rounded-border"
    (click)="navigate.emit(-1)"
    [matTooltip]="'Previous week' | translate"
  >
    <mat-icon color="primary">chevron_left</mat-icon>
  </button>
  <button
    class="btn-secondary btn-secondary--icon-rounded-border"
    (click)="navigate.emit(1)"
    [matTooltip]="'Next week' | translate"
  >
    <mat-icon color="primary">chevron_right</mat-icon>
  </button>

  <span class="date-range">{{ displayDate }}</span>

  <span class="spacer"></span>

  <div class="text-field--rounded">
    <mat-form-field>
      <mtx-select [ngModel]="viewMode" (ngModelChange)="viewModeChange.emit($event)" [items]="viewModeOptions" bindValue="value" bindLabel="label" [clearable]="false"></mtx-select>
    </mat-form-field>
  </div>
</div>
